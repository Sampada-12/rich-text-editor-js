<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>text Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js"></script>
  </head>
  <body>
    <!-- Main Container -->
    <div class="container">
      <!-- Toolbar Section -->
      <div class="toolbar">
        <!-- Top Toolbar -->
        <div class="head">
          <!-- File Name Input -->
          <input
            type="text"
            name="FileName"
            id="fileName"
            placeholder="File Name"
          />

          <!-- File Options -->
          <select>
            <option value="" selected hidden>File</option>
            <option value="">New File</option>
            <option value="">Save as text</option>
            <option value="">Save as pdf</option>
          </select>

          <!-- Text Format Options -->
          <select name="" id="">
            <option value="">Formate</option>
            <option value="">H1</option>
            <option value="">H2</option>
            <option value="">H3</option>
            <option value="">H4</option>
            <option value="">H5</option>
            <option value="">H6</option>
            <option value="">Paragraph</option>
          </select>

          <!-- Font Size Options -->
          <select>
            <option value="" selected hidden>Font Size</option>
            <option value="">Extra Small</option>
            <option value="">Small</option>
            <option value="">Medium</option>
            <option value="">Large</option>
            <option value="">Extra Large</option>
            <option value="">Big</option>
          </select>

          <!-- Text Color Picker -->
          <div class="color">
            <span>Color</span>
            <input type="color" />
          </div>

          <!-- Background Color Picker -->
          <div class="color">
            <span>Background</span>
            <input type="color" />
          </div>
        </div>

        <!-- Button Toolbar -->
        <div class="btn-toolbar">
          <!-- Undo Button -->
          <button onclick="formatDoc('undo')">
            <i class="fa-solid fa-rotate-left"></i>
          </button>
          <!-- Redo Button -->
          <button onclick="formatDoc('redo')">
            <i class="fa-solid fa-rotate-right"></i>
          </button>
          <!-- Bold Button -->
          <button onclick="formatDoc('bold')">
            <i class="fa-solid fa-bold"></i>
          </button>
          <!-- Underline Button -->
          <button onclick="formatDoc('underline')">
            <i class="fa-solid fa-underline"></i>
          </button>
          <!-- Italic Button -->
          <button onclick="formatDoc('italic')">
            <i class="fa-solid fa-italic"></i>
          </button>
          <!-- StrikeThrough Button -->
          <button onclick="formatDoc('strikeThrough')">
            <i class="fa-solid fa-strikethrough"></i>
          </button>
          <!-- Align Left -->
          <button onclick="formatDoc('justifyLeft')">
            <i class="fa-solid fa-align-left"></i>
          </button>
          <!-- Align Center -->
          <button onclick="formatDoc('justifyCenter')">
            <i class="fa-solid fa-align-center"></i>
          </button>
          <!-- Align Right -->
          <button onclick="formatDoc('justifyRight')">
            <i class="fa-solid fa-align-right"></i>
          </button>
          <!-- Justify Content -->
          <button onclick="formatDoc('justifyFull')">
            <i class="fa-solid fa-align-justify"></i>
          </button>
          <!-- Ordered List -->
          <button onclick="formatDoc('insertOrderedList')">
            <i class="fa-solid fa-list-ol"></i>
          </button>
          <!-- Unordered List -->
          <button onclick="formatDoc('insertUnorderedList')">
            <i class="fa-solid fa-list"></i>
          </button>
          <!-- Add Link -->
          <button onclick="handleAddLink()">
            <i class="fa-solid fa-link"></i>
          </button>
          <!-- Remove Link -->
          <button onclick="formatDoc('unlink')">
            <i class="fa-solid fa-link-slash"></i>
          </button>
          <!-- Code Block -->
          <button onclick="formatDoc('')">
            <i class="fa-solid fa-code"></i>
          </button>
        </div>
      </div>

      <!-- Editable Content Area -->
      <div id="content" contenteditable="true" data-placeholder="Type something here..."></div>
    </div>
  </body>
</html>
